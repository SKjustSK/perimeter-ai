version: '3.8'

services:
  db:
    image: postgres:15-alpine
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: perimeter
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d perimeter"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_data:/qdrant/storage

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://admin:password@db:5432/perimeter?schema=public
      - QDRANT_URL=http://qdrant:6333
      - INFERENCE_API_URL=http://inference-service:8000
      - SHARED_UPLOAD_DIR=/shared-uploads
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      inference-service:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - shared-uploads:/shared-uploads

  inference-service:
    build:
      context: ./inference-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - SHARED_UPLOAD_DIR=/shared-uploads
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      - ./inference-service:/app
      - shared-uploads:/shared-uploads
      - ultralytics-cache:/root/.ultralytics

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  shared-uploads:
  ultralytics-cache:
