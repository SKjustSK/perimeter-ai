services:
  # ── Infrastructure ────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: perimeter-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: perimeter_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d perimeter_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: perimeter-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: perimeter-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: perimeter-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Application Services ──────────────────────────────────────────────────

  core-api:
    build:
      context: ./core-api
      dockerfile: Dockerfile
    container_name: perimeter-core-api
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:your_secure_password@postgres:5432/perimeter_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: video_jobs
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_REGION: us-east-1
      STORAGE_BUCKET: surveillance-videos
      QDRANT_URL: http://qdrant:6333
      INFERENCE_ENGINE_URL: http://inference-api:5001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_healthy
      inference-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Inference Engine (split into API + Worker) ────────────────────────────

  inference-api:
    build:
      context: ./inference-engine
      dockerfile: Dockerfile
    container_name: perimeter-inference-api
    # Default CMD in Dockerfile runs main.py (API server)
    ports:
      - "5001:5001"
    environment:
      ENGINE_API_PORT: 5001
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      STORAGE_BUCKET: surveillance-videos
      CROPS_BUCKET: surveillance-crops
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      COLLECTION_NAME: targets
    depends_on:
      minio:
        condition: service_started
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  inference-worker:
    build:
      context: ./inference-engine
      dockerfile: Dockerfile
    # Override CMD to run the standalone worker entrypoint
    command: ["python", "worker.py"]
    environment:
      DATABASE_URL: postgresql://postgres:your_secure_password@postgres:5432/perimeter_db?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_NAME: video_jobs
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      STORAGE_BUCKET: surveillance-videos
      CROPS_BUCKET: surveillance-crops
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      COLLECTION_NAME: targets
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:3000
        VITE_MINIO_URL: http://localhost:9000
    container_name: perimeter-frontend
    ports:
      - "80:80"
    depends_on:
      core-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  qdrant_data: