services:
  # Database Layer
  postgres:
    image: postgres:15-alpine
    container_name: perimeter-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_secure_password
      POSTGRES_DB: perimeter_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Message Broker
  redis:
    image: redis:7-alpine
    container_name: perimeter-redis
    ports:
      - "6379:6379"
    restart: always

  # Object Storage
  minio:
    image: minio/minio:latest
    container_name: perimeter-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console UI
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  # Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: perimeter-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always 

volumes:
  postgres_data:
  minio_data:
  qdrant_data: